name: Build Docs

on:
  push:
    branches: ['master', 'main']
  pull_request:
  workflow_dispatch:

env:
  PYTHON_VERSION_DEFAULT: "3.10"

# https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/controlling-permissions-for-github_token
permissions: {}

jobs:
  docs_xml:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docgen/xml
    steps:
    - name: Checkout
      # see https://github.com/actions/checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    - name: Set up JDK
      # see https://github.com/actions/setup-java
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
      with:
        java-version: '21'
        distribution: 'zulu'
        java-package: jdk
    - name: Generate Schema documentation
      run: ./gen.sh
    - name: Archive Schema documentation
      # https://github.com/actions/upload-artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: XML-Schema-documentation
        path: docgen/xml/docs
        if-no-files-found: error
  docs_json:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docgen/json
    steps:
    - name: Checkout
      # see https://github.com/actions/checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    - name: Setup Python Environment
      # see https://github.com/actions/setup-python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: ${{ env.PYTHON_VERSION_DEFAULT }}
        architecture: 'x64'
    - name: Generate Schema documentation
      run: ./gen.sh
    - name: Archive Schema documentation
      # https://github.com/actions/upload-artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: JSON-Schema-documentation
        path: docgen/json/docs
        if-no-files-found: error
  docs_proto:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docgen/proto
    steps:
    - name: Checkout
      # see https://github.com/actions/checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    - name: Generate Schema documentation
      run: ./gen.sh
    - name: Archive Schema documentation
      # https://github.com/actions/upload-artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: PROTO-Schema-documentation
        path: docgen/proto/docs
        if-no-files-found: error
